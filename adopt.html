<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Get a Pet</title>
    <link rel="stylesheet" href="adopt.css">
</head>
<body>
<div class="box"></div>
<h2>Get your new friend❤️</h2>

<form id="adopt-form">
    <input type="text" placeholder="Your name" required><br>
    <input type="tel" placeholder="Your phone number" required><br>
    <input type="number" placeholder="Your Age" required><br>
    <button type="submit">Submit</button>
</form>
<script>
    document.getElementById("adopt-form").addEventListener("submit", function(e){
        let age = document.querySelector('input[type="number"]').value;
        if (age < 21){
            alert("sorry you are underage '21' !!");
            e.preventDefault();
        }
    });
</script>
</body>
</html>
